# Local dev stack. The API currently runs on its in-memory dataset; Postgres
# and Redis are provisioned for the persistence/caching path (Phase 3+).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finviz
      POSTGRES_PASSWORD: finviz
      POSTGRES_DB: finviz
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finviz"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      BIND_ADDR: 0.0.0.0:8080
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgres://finviz:finviz@db:5432/finviz
      REDIS_URL: redis://redis:6379
      RUST_LOG: info,finviz_api=debug
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
    environment:
      BACKEND_URL: http://backend:8080
      PUBLIC_WS_URL: ws://localhost:8080/ws/quotes
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db-data:
